<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ACL 2026 Main Conference Accepted</title>
  <desc id="desc">Decorative banner celebrating acceptance to ACL 2026 Main Conference.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6E8"/>
      <stop offset="1" stop-color="#FFE0D2"/>
    </linearGradient>
    <linearGradient id="pill" x1="178" y1="38" x2="1022" y2="222" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BE123C"/>
      <stop offset="1" stop-color="#7F1D1D"/>
    </linearGradient>
    <linearGradient id="yearPill" x1="28" y1="30" x2="180" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4B8"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="trophyGold" x1="1060" y1="58" x2="1158" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF2A6"/>
      <stop offset="0.45" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow" x="132" y="28" width="936" height="204" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#7F1D1D" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="1020" y="50" width="184" height="168" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#7C2D12" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="260" rx="28" fill="url(#bg)"/>
  <circle cx="88" cy="74" r="54" fill="#F59E0B" fill-opacity="0.16"/>
  <circle cx="1112" cy="194" r="68" fill="#2563EB" fill-opacity="0.12"/>
  <circle cx="1050" cy="78" r="28" fill="#BE123C" fill-opacity="0.14"/>

  <g filter="url(#shadow)">
    <rect x="156" y="46" width="888" height="168" rx="84" fill="url(#pill)"/>
  </g>

  <rect x="28" y="30" width="152" height="42" rx="21" fill="url(#yearPill)" stroke="#7C2D12" stroke-width="2.5"/>
  <text x="104" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" letter-spacing="2.5" fill="#5B120E">2026</text>

  <text x="600" y="122" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="800" letter-spacing="5" fill="#FFF8EE">ACL MAIN ACCEPTED</text>
  <text x="600" y="162" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" letter-spacing="1.2" fill="#FEE2E2">From Verbatim to Gist: MM-Mem is accepted to the main conference</text>

  <g filter="url(#softShadow)" transform="translate(20 0)">
